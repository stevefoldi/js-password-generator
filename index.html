<html>
    <head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="index.css">
        <title>Password Generator</title>
    </head>
    <body>
        <div class="container">
            <h1>Generate a <br> <span class="font-green">random password</span></h1>
            <p>Never use an insecure password again.</p>
            <div class="password-length-container">
                <span class="text-small">Password length:</span> <input type="text" id="password-length" value="15">
            </div>
            <div class="checkbox-group">
                <label class="checkbox-container" for="include-numbers">
                    <span class="label-text">Include Numbers:</span>
                    <input type="checkbox" id="include-numbers" checked>
                </label>
                <label class="checkbox-container" for="include-speical-characters">
                    <span class="label-text">Include Speical Characters:</span>
                    <input type="checkbox" id="include-speical-characters" checked>
                </label>
            </div>
            <button id="generate-btn" class="btn-main">Generate passwords</button>
            <div class="divider-line"></div>
            <div class="passwords-container mar-b-40">
                <input type="text" id="password-one" readonly><i class="fa-solid fa-copy"></i>
                <input type="text" id="password-two" readonly>
            </div>
            <button id="reset-btn" class="btn-reset">Reset All</button>
        </div>
        <script src="index.js"></script>
    </body>
</html>
